name: BDD tests

on:
  workflow_call:
    inputs:
      service:
        description: Service to be tested
        required: true
        type: string

      use_kafka:
        description: Whether to use Kafka
        required: false
        type: boolean
        default: false

      use_postgres:
        description: Whether to use PostgreSQL
        required: false
        type: boolean
        default: false

      postgres_version:
        description: PostgreSQL version
        required: false
        type: string
        default: "13.9"

      use_minio:
        description: Whether to use MinIO
        required: false
        type: boolean
        default: false

      use_pushgateway:
        description: Whether to use Prometheus Pushgateway
        required: false
        type: boolean
        default: false

      use_mock-oauth2-server:
        description: Whether to use Mock OAuth2 Server
        required: false
        type: boolean
        default: false

      go_version:
        description: Version of Go to be used to build the service
        required: false
        type: string
        default: "1.24"

      install_service:
        description: Whether to install the service as a Python package via pip install
        required: false
        type: boolean
        default: false

      bdd_config:
        description: Path to the BDD framework config file
        required: false
        type: string
        default: "insights-behavioral-spec/bdd-configs/framework.yml"

      parallel_execution:
        description: "Ejecutar de forma paralela usando steps independientes por .feature"
        required: false
        type: boolean
        default: false

      max_parallel:
        description: "Cantidad máxima de ejecuciones simultáneas (1 para secuencial)."
        required: false
        type: number
        default: 256
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Descubre las features y crea la matriz JSON
  discover_features:
    if: ${{ inputs.parallel_execution }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discovery.outputs.matrix }}
      has_features: ${{ steps.discovery.outputs.has_features }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout insights-behavioral-spec
        uses: actions/checkout@v4
        with:
          repository: LukenLarra/insights-behavioral-spec
          ref: main
          path: insights-behavioral-spec

      - name: Link framework config and resources
        run: |
          ln -sf "${{ github.workspace }}/insights-behavioral-spec/bdd-configs/${{ inputs.service }}-framework.yml" framework.yml
          cd "${{ github.workspace }}"
          for item in insights-behavioral-spec/*/; do
            dir_name=$(basename "$item")
            if [ "$dir_name" = "bdd-configs" ]; then
              continue
            fi
            if [ ! -e "$dir_name" ]; then
              ln -sf "${{ github.workspace }}/insights-behavioral-spec/$dir_name" "$dir_name"
              echo "Linked: $dir_name → insights-behavioral-spec/$dir_name"
            elif [ -d "$dir_name" ]; then
              echo "Directory $dir_name already exists, merging contents via copy..."
              cp -r "insights-behavioral-spec/$dir_name/"* "$dir_name/" 2>/dev/null || true
            else
              echo "Skipped (already exists): $dir_name"
            fi
          done

      - name: Run discovery
        id: discovery
        uses: LukenLarra/RedHat-BDD-Framework/actions/discovery@feature-level-parallel-execution
        with:
          bdd_config: "${{ github.workspace }}/framework.yml"

  # Compila el binario de Go y empaqueta el directorio resultante
  build_binary:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        if: ${{ !inputs.install_service }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build service binary
        if: ${{ !inputs.install_service }}
        run: |
          if [ -f "build.sh" ]; then
            echo "Found build.sh, running it"
            ./build.sh
          elif [ -f "Makefile" ] && grep -q "^build:" Makefile; then
            echo "Found Makefile with build target, running make build"
            make build
          else
            echo "No build step found, skipping"
          fi

      - name: Set artifact name
        id: set_artifact_name
        run: echo "name=workspace-build-${{ github.run_id }}-$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Archive workspace build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.name }}
          path: |
            .
          include-hidden-files: true

  # Usar strategy matrix con el output del anterior
  bdd:
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') && (!inputs.parallel_execution || needs.discover_features.outputs.has_features == 'true') }}
    needs: [discover_features, build_binary]
    runs-on: ubuntu-latest
    name: BDD tests ${{ matrix.feature_file != '' && format('- {0}', matrix.feature_file) || '' }}

    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.parallel_execution == true && fromJSON(inputs.max_parallel || '256') || 1 }}
      matrix:
        feature_file: ${{ inputs.parallel_execution == true && fromJSON(needs.discover_features.outputs.matrix) || fromJSON('[""]') }}

    services:
      kafka:
        image: ${{ inputs.use_kafka == true && 'quay.io/ccxdev/kafka-no-zk:latest' || '' }}
        ports:
          - 9092:9092
        env:
          KAFKA_ADVERTISED_HOST_NAME: localhost
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

      database:
        image: ${{ inputs.use_postgres == true && format('postgres:{0}', inputs.postgres_version) || '' }}
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test

      minio:
        image: ${{ inputs.use_minio == true && 'quay.io/ccxdev/minio-server-ubi:latest' || '' }}
        ports:
          - 9000:9000
        env:
          MINIO_ACCESS_KEY: test_access_key
          MINIO_SECRET_KEY: test_secret_access_key
          PORT: 9000

      pushgateway:
        image: ${{ inputs.use_pushgateway == true && 'quay.io/ccxdev/prom-pushgateway-admin:latest' || '' }}
        ports:
          - 9091:9091

      mock-oauth2-server:
        image: ${{ inputs.use_mock-oauth2-server == true && 'ghcr.io/navikt/mock-oauth2-server:2.2.1' || '' }}
        ports:
          - 8081:8081
        env:
          PORT: 8081

    steps:
      - name: Download workspace build
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_binary.outputs.artifact_name }}
          path: .

      - name: Restore permissions and path
        run: |
          chmod -R +x * || true
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Checkout insights-behavioral-spec
        uses: actions/checkout@v4
        with:
          repository: LukenLarra/insights-behavioral-spec
          ref: main
          path: insights-behavioral-spec

      - name: Install kcat
        if: ${{ inputs.use_kafka }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y kafkacat

      - name: Link framework config and resources
        run: |
          cd "${{ github.workspace }}"
          ln -sf "${{ github.workspace }}/insights-behavioral-spec/bdd-configs/${{ inputs.service }}-framework.yml" framework.yml
          for item in insights-behavioral-spec/*/; do
            dir_name=$(basename "$item")
            if [ "$dir_name" = "bdd-configs" ]; then
              continue
            fi
            if [ -e "$dir_name" ]; then
              echo "Skipped (already exists): $dir_name"
            else
              ln -sf "${{ github.workspace }}/insights-behavioral-spec/$dir_name" "$dir_name"
              echo "Linked: $dir_name → insights-behavioral-spec/$dir_name"
            fi
          done
          echo "=== Symlinks created ==="
          ls -la | grep "^l"

      - name: Add hosts entries
        if: ${{ inputs.use_pushgateway || inputs.use_mock-oauth2-server }}
        run: |
          if ${{ inputs.use_pushgateway }}; then
            echo "127.0.0.1 pushgateway" | sudo tee -a /etc/hosts
          fi
          if ${{ inputs.use_mock-oauth2-server }}; then
            echo "127.0.0.1 mock-oauth2-server" | sudo tee -a /etc/hosts
          fi

      - name: Run BDD Framework
        uses: LukenLarra/RedHat-BDD-Framework@main
        with:
          service: ${{ inputs.service }}
          bdd_config: "${{ github.workspace }}/framework.yml"
          test_requirements: "insights-behavioral-spec/requirements.txt"
          service_package: ${{ inputs.install_service == true && github.workspace || '' }}
          feature_file: ${{ matrix.feature_file }}
          artifact_name_suffix: ${{ inputs.parallel_execution == true && format('-job-{0}', strategy.job-index) || '' }}

  publish_report:
    name: Publish Test Results
    needs: bdd
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download partial reports
        uses: actions/download-artifact@v4
        with:
          pattern: bdd-test-reports-${{ inputs.service }}-*
          path: reports/junit
          merge-multiple: true

      - name: Publish merged test results
        uses: LukenLarra/RedHat-BDD-Framework/actions/publish-reports@main
        with:
          report_path: "reports/junit/*.xml"
