name: BDD tests

on:
  workflow_call:
    inputs:
      service:
        description: Service to be tested
        required: true
        type: string

      use_kafka:
        description: Whether to use Kafka
        required: false
        type: boolean
        default: false

      use_postgres:
        description: Whether to use PostgreSQL
        required: false
        type: boolean
        default: false

      postgres_version:
        description: PostgreSQL version
        required: false
        type: string
        default: "13.9"

      use_minio:
        description: Whether to use MinIO
        required: false
        type: boolean
        default: false

      use_pushgateway:
        description: Whether to use Prometheus Pushgateway
        required: false
        type: boolean
        default: false

      use_mock-oauth2-server:
        description: Whether to use Mock OAuth2 Server
        required: false
        type: boolean
        default: false

      go_version:
        description: Version of Go to be used to build the service
        required: false
        type: string
        default: "1.24"

      bdd_config:
        description: Path to the BDD framework config file
        required: false
        type: string
        default: "insights-behavioral-spec/bdd-configs/framework.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  bdd:
    runs-on: ubuntu-latest
    name: BDD tests

    services:
      kafka:
        image: ${{ inputs.use_kafka == true && 'quay.io/ccxdev/kafka-no-zk:latest' || '' }}

      database:
        image: ${{ inputs.use_postgres == true && format('postgres:{0}', inputs.postgres_version) || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test

      minio:
        image: ${{ inputs.use_minio == true && 'quay.io/ccxdev/minio-server-ubi:latest' || '' }}
        env:
          MINIO_ACCESS_KEY: test_access_key
          MINIO_SECRET_KEY: test_secret_access_key
          PORT: 9000

      pushgateway:
        image: ${{ inputs.use_pushgateway == true && 'quay.io/ccxdev/prom-pushgateway-admin:latest' || '' }}

      mock-oauth2-server:
        image: ${{ inputs.use_mock-oauth2-server == true && 'ghcr.io/navikt/mock-oauth2-server:2.2.1' || '' }}
        env:
          PORT: 8081

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout insights-behavioral-spec
        uses: actions/checkout@v4
        with:
          repository: LukenLarra/insights-behavioral-spec
          ref: bdd-framework-migration
          path: insights-behavioral-spec

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build service binary
        run: |
          make build

      - name: Copy framework config
        run: cp insights-behavioral-spec/bdd-configs/${{ inputs.service }}-framework.yml framework.yml

      - name: Run BDD Framework
        uses: LukenLarra/RedHat-BDD-Framework@integrate-processing-tools-bdd
        with:
          service: ${{ inputs.service }}
          bdd_config: "${{ github.workspace }}/framework.yml"