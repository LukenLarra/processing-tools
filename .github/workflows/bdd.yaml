name: BDD tests

on:
  workflow_call:
    inputs:
      service:
        description: Service to be tested
        required: true
        type: string

      use_kafka:
        description: Whether to use Kafka
        required: false
        type: boolean
        default: false

      use_postgres:
        description: Whether to use PostgreSQL
        required: false
        type: boolean
        default: false

      postgres_version:
        description: PostgreSQL version
        required: false
        type: string
        default: "13.9"

      use_minio:
        description: Whether to use MinIO
        required: false
        type: boolean
        default: false

      use_pushgateway:
        description: Whether to use Prometheus Pushgateway
        required: false
        type: boolean
        default: false

      use_mock-oauth2-server:
        description: Whether to use Mock OAuth2 Server
        required: false
        type: boolean
        default: false

      go_version:
        description: Version of Go to be used to build the service
        required: false
        type: string
        default: "1.24"

      install_service:
        description: Whether to install the service as a Python package via pip install
        required: false
        type: boolean
        default: false

      bdd_config:
        description: Path to the BDD framework config file
        required: false
        type: string
        default: "insights-behavioral-spec/bdd-configs/framework.yml"

      parallel_execution:
        description: "Ejecutar de forma paralela usando steps independientes por .feature"
        required: false
        type: boolean
        default: false

      max_parallel:
        description: "Cantidad máxima de ejecuciones simultáneas (1 para secuencial)."
        required: false
        type: number
        default: 256

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Descubre las features y crea la matriz JSON
  discover_features:
    if: ${{ inputs.parallel_execution }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discovery.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout insights-behavioral-spec
        uses: actions/checkout@v4
        with:
          repository: LukenLarra/insights-behavioral-spec
          ref: main
          path: insights-behavioral-spec

      - name: Copy framework config
        run: cp insights-behavioral-spec/bdd-configs/${{ inputs.service }}-framework.yml framework.yml

      - name: Run discovery
        id: discovery
        uses: LukenLarra/RedHat-BDD-Framework/discovery@feature-level-parallel-execution
        with:
          bdd_config: "${{ github.workspace }}/framework.yml"

  # Compila el binario de Go y empaqueta el directorio resultante
  build_binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        if: ${{ !inputs.install_service }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go_version }}

      - name: Build service binary
        if: ${{ !inputs.install_service }}
        run: |
          if [ -f "build.sh" ]; then
            echo "Found build.sh, running it"
            ./build.sh
          elif [ -f "Makefile" ] && grep -q "^build:" Makefile; then
            echo "Found Makefile with build target, running make build"
            make build
          else
            echo "No build step found, skipping"
          fi

      - name: Archive workspace build
        uses: actions/upload-artifact@v4
        with:
          name: workspace-build-${{ github.run_id }}
          path: |
            .
          include-hidden-files: true

  # Usar strategy matrix con el output del anterior
  bdd:
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: [discover_features, build_binary]
    runs-on: ubuntu-latest
    name: BDD tests ${{ matrix.feature_file != '' && format('- {0}', matrix.feature_file) || '' }}

    strategy:
      fail-fast: false # Si falla un test, los demás continuan
      max-parallel: ${{ inputs.parallel_execution == true && fromJSON(inputs.max_parallel || '256') || 1 }}
      matrix:
        feature_file: ${{ inputs.parallel_execution == true && fromJSON(needs.discover_features.outputs.matrix) || fromJSON('[""]') }}

    services:
      kafka:
        image: ${{ inputs.use_kafka == true && 'quay.io/ccxdev/kafka-no-zk:latest' || '' }}
        ports:
          - 9092:9092
        env:
          KAFKA_ADVERTISED_HOST_NAME: localhost
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

      database:
        image: ${{ inputs.use_postgres == true && format('postgres:{0}', inputs.postgres_version) || '' }}
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test

      minio:
        image: ${{ inputs.use_minio == true && 'quay.io/ccxdev/minio-server-ubi:latest' || '' }}
        ports:
          - 9000:9000
        env:
          MINIO_ACCESS_KEY: test_access_key
          MINIO_SECRET_KEY: test_secret_access_key
          PORT: 9000

      pushgateway:
        image: ${{ inputs.use_pushgateway == true && 'quay.io/ccxdev/prom-pushgateway-admin:latest' || '' }}
        ports:
          - 9091:9091

      mock-oauth2-server:
        image: ${{ inputs.use_mock-oauth2-server == true && 'ghcr.io/navikt/mock-oauth2-server:2.2.1' || '' }}
        ports:
          - 8081:8081
        env:
          PORT: 8081

    steps:
      - name: Download workspace build
        uses: actions/download-artifact@v4
        with:
          name: workspace-build-${{ github.run_id }}
          path: .

      - name: Restore permissions
        run: chmod -R +x * || true

      - name: Checkout insights-behavioral-spec
        uses: actions/checkout@v4
        with:
          repository: LukenLarra/insights-behavioral-spec
          ref: main
          path: insights-behavioral-spec

      - name: Install kcat
        if: ${{ inputs.use_kafka }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y kafkacat

      - name: Copy framework config
        run: cp insights-behavioral-spec/bdd-configs/${{ inputs.service }}-framework.yml framework.yml

      - name: Add hosts entries
        if: ${{ inputs.use_pushgateway || inputs.use_mock-oauth2-server }}
        run: |
          if ${{ inputs.use_pushgateway }}; then
            echo "127.0.0.1 pushgateway" | sudo tee -a /etc/hosts
          fi
          if ${{ inputs.use_mock-oauth2-server }}; then
            echo "127.0.0.1 mock-oauth2-server" | sudo tee -a /etc/hosts
          fi

      - name: Run BDD Framework
        uses: LukenLarra/RedHat-BDD-Framework@feature-level-parallel-execution
        with:
          service: ${{ inputs.service }}
          bdd_config: "${{ github.workspace }}/framework.yml"
          test_requirements: "insights-behavioral-spec/requirements.txt"
          service_package: ${{ inputs.install_service == true && github.workspace || '' }}
          feature_file: ${{ matrix.feature_file }}
          publish_results: ${{ inputs.parallel_execution == true && 'false' || 'true' }}
          artifact_name_suffix: ${{ inputs.parallel_execution == true && format('-job-{0}', strategy.job-index) || '' }}
